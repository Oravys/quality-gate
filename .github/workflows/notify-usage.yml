name: Track Usage

on:
  fork:
  watch:
    types: [started]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const user = context.actor;
            const repo = context.repo.repo;
            let title, body;

            if (event === 'fork') {
              const forkUrl = context.payload.forkee.html_url;
              title = `New fork by @${user}`;
              body = `**${user}** forked **${repo}**\n\n` +
                     `Fork: ${forkUrl}\n` +
                     `Profile: https://github.com/${user}\n\n` +
                     `> Apache 2.0 + NOTICE attribution is required for any use.`;
            } else if (event === 'watch') {
              title = `New star by @${user}`;
              body = `**${user}** starred **${repo}**\n\nProfile: https://github.com/${user}`;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['usage-tracking']
            });
